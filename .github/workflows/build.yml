name: Build Genzflexy
on: [push, workflow_dispatch]

jobs:
  deploy:
    runs-on: windows-latest # MUST be windows-latest for WPF
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build and Publish
        # This command creates the single Genzflexy.exe
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./output

      - name: Upload Finished EXE
        uses: actions/upload-artifact@v4
        with:
          name: Genzflexy-App
          path: ./output/*.exe
